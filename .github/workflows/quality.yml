# Lint, production build, static preview, then Axe accessibility scan.
name: Quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Generate PWA assets
        run: npm run gen:icons

      - name: Production build (GitHub Pages base)
        env:
          VITE_BASE_URL: /${{ github.event.repository.name }}/
        run: npm run build

      # Preview + Axe must run in one step: GHA terminates background jobs when the step ends.
      - name: Start preview, wait, then Axe scan
        env:
          VITE_BASE_URL: /${{ github.event.repository.name }}/
        run: |
          set -euo pipefail
          BASE_PATH="/${{ github.event.repository.name }}/"
          PREVIEW_URL="http://127.0.0.1:4173${BASE_PATH}"
          npx vite preview --port 4173 --strictPort --host 127.0.0.1 &
          PREVIEW_PID=$!
          trap 'kill "${PREVIEW_PID}" 2>/dev/null || true' EXIT
          for i in $(seq 1 60); do
            if curl -fsS "${PREVIEW_URL}" >/dev/null 2>&1; then
              echo "preview up (${PREVIEW_URL})"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "preview failed to respond in time"
              exit 1
            fi
            sleep 1
          done
          node scripts/check-render.mjs "${PREVIEW_URL}"
          npx playwright install chromium --with-deps
          QA_URL="${PREVIEW_URL}" node scripts/visual-qa.mjs
          npx @axe-core/cli "${PREVIEW_URL}" --exit --tags wcag2a

      # Lighthouse often hits NO_FCP against local Vite preview in headless CI; run it locally after `vite preview` if needed (see docs/device-qa-checklist.md).
