# Build and deploy the Vite app to GitHub Pages (project site: /<repo>/).
# Enable: Settings → Pages → Source: GitHub Actions (required or deploy step returns 404).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        env:
          # Project Pages base path (must match repo name for default gh-pages URL)
          VITE_BASE_URL: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v5
