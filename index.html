<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f7fb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#080b12" media="(prefers-color-scheme: dark)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Silo" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="apple-touch-startup-image" href="/splash/iphone-portrait.png" media="(orientation: portrait)" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Silo — Private Vault</title>
    <meta
      name="description"
      content="Private local-first vault for files, notes, screenshots, and voice memos."
    />
    <style>
      .silo-boot-fallback {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #f4f7fb;
        color: #07111f;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      }
      .silo-boot-icon {
        width: 64px;
        height: 64px;
        border-radius: 18px;
        background: linear-gradient(135deg, #4f6df5, #6f5df6);
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 28px;
        font-weight: 700;
        box-shadow: 0 10px 30px rgba(79, 109, 245, 0.28);
      }
      .silo-boot-fallback p {
        margin: 0;
        font-size: 15px;
        color: #667085;
      }
      @media (prefers-color-scheme: dark) {
        .silo-boot-fallback {
          background: #080b12;
          color: #f8fafc;
        }
        .silo-boot-fallback p {
          color: #a1a8b5;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="silo-boot-fallback">
        <div class="silo-boot-icon">S</div>
        <p>Opening Silo…</p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
